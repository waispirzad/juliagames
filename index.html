<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>Julia Games</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="196x196" href="./assets/icons/favicon-196.png">
  <link rel="apple-touch-icon" href="./assets/icons/apple-icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>

  <!-- Start Screen -->
  <div id="start-screen" class="screen start-screen">
    <div class="start-logo">🎮</div>
    <h1 class="start-title">Julia Games</h1>
    <p class="start-subtitle">Tap the button to start!</p>
    <button class="btn-play" id="btn-play">Start Playing</button>
  </div>

  <!-- Game Hub -->
  <div id="hub" class="screen hub" style="display:none">
    <h1 class="hub-title">Julia Games</h1>
    <div class="game-grid">
      <button class="game-card" id="card-bubbles">
        <span class="game-card-emoji">🫧</span>
        <span class="game-card-title">Pop Bubbles</span>
      </button>
    </div>
  </div>

  <!-- Game loads here — iframe keeps fullscreen alive -->
  <iframe id="game-frame" allowfullscreen></iframe>

  <script src="./js/utils.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/tracker.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
