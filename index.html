<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#e94560">
  <title>Julia Games</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="196x196" href="./assets/icons/favicon-196.png">
  <link rel="apple-touch-icon" href="./assets/icons/apple-icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    /* Start screen */
    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 24px;
    }

    .start-logo {
      font-size: 80px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    .start-title {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1, #FFEAA7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .start-subtitle {
      font-size: 1.1rem;
      opacity: 0.6;
      margin-bottom: 48px;
    }

    .start-btn {
      background: linear-gradient(135deg, #e94560, #FF6B6B);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      padding: 20px 60px;
      border-radius: 50px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 8px 32px rgba(233, 69, 96, 0.4);
      transition: transform 0.15s ease;
      font-family: inherit;
    }

    .start-btn:active {
      transform: scale(0.95);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(233, 69, 96, 0.4); }
      50% { box-shadow: 0 8px 48px rgba(233, 69, 96, 0.6); }
    }

    .start-btn { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Start Screen — tap to go fullscreen and enter hub -->
  <div id="start-screen" class="start-screen">
    <div class="start-logo">🎮</div>
    <div class="start-title">Julia Games</div>
    <div class="start-subtitle">Tap the button to start playing!</div>
    <button class="start-btn" onclick="startPlaying()">Start Playing</button>
  </div>

  <!-- Game Hub — hidden until start -->
  <div id="hub" class="hub" style="display: none;">
    <h1 class="hub-title">Julia Games</h1>
    <div class="game-grid">
      <button class="game-card card-tap" onclick="goToGame('./games/tap-react/')">
        <span class="game-card-emoji">🎆</span>
        <span class="game-card-title">Tap & React</span>
      </button>
      <button class="game-card card-bubbles" onclick="goToGame('./games/pop-bubbles/')">
        <span class="game-card-emoji">🫧</span>
        <span class="game-card-title">Pop Bubbles</span>
      </button>
      <button class="game-card card-animals" onclick="goToGame('./games/animal-sounds/')">
        <span class="game-card-emoji">🐾</span>
        <span class="game-card-title">Animal Sounds</span>
      </button>
    </div>
  </div>

  <script src="./js/utils.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/touch.js"></script>
  <script src="./js/tracker.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
