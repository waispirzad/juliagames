<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#45B7D1">
  <title>Animal Sounds — Julia Games</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
  <button class="back-btn" id="back-btn">&#8592;</button>

  <div class="animal-grid">
    <button class="animal-card" data-animal="cow">
      <span class="animal-emoji">🐄</span>
      <span class="animal-name">Cow</span>
    </button>
    <button class="animal-card" data-animal="cat">
      <span class="animal-emoji">🐱</span>
      <span class="animal-name">Cat</span>
    </button>
    <button class="animal-card" data-animal="dog">
      <span class="animal-emoji">🐶</span>
      <span class="animal-name">Dog</span>
    </button>
    <button class="animal-card" data-animal="duck">
      <span class="animal-emoji">🦆</span>
      <span class="animal-name">Duck</span>
    </button>
    <button class="animal-card" data-animal="sheep">
      <span class="animal-emoji">🐑</span>
      <span class="animal-name">Sheep</span>
    </button>
    <button class="animal-card" data-animal="horse">
      <span class="animal-emoji">🐴</span>
      <span class="animal-name">Horse</span>
    </button>
    <button class="animal-card" data-animal="pig">
      <span class="animal-emoji">🐷</span>
      <span class="animal-name">Pig</span>
    </button>
    <button class="animal-card" data-animal="chicken">
      <span class="animal-emoji">🐔</span>
      <span class="animal-name">Chicken</span>
    </button>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/touch.js"></script>
  <script src="../../js/tracker.js"></script>
  <script src="../../js/app.js"></script>
  <script src="./game.js"></script>
</body>
</html>
